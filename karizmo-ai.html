<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Karizmo AI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --void:#0a0a0f;
  --surface:#151522;
  --lifted:#1e1e30;
  --glow:#8b4fff;
  --glow-bright:#a855ff;
  --accent:#00d9ff;
  --success:#4ade80;
  --error:#ff4757;
  --text:#f0f0f8;
  --muted:#8b8ba8;
  --r:12px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100%;
  background:var(--void);
  color:var(--text);
  font-family:'Space Mono',monospace;
  overflow-x:hidden;
}

/* ── BACKGROUND ── */
.bg-fx{
  position:fixed;width:100%;height:100%;
  z-index:0;pointer-events:none;
}
.glow-blob{
  position:absolute;border-radius:50%;
  filter:blur(100px);opacity:0.12;
}
.blob1{width:500px;height:500px;background:#8b4fff;top:-200px;right:-100px;}
.blob2{width:350px;height:350px;background:#00d9ff;bottom:-150px;left:10%;}
.blob3{width:250px;height:250px;background:#ff4757;top:40%;left:-80px;opacity:0.07;}

/* ── LAYOUT ── */
.container{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:50px 24px 80px;
}

/* ── HEADER ── */
.header{text-align:center;margin-bottom:40px;}
.logo{
  font-family:'Syne',sans-serif;
  font-size:clamp(42px,10vw,72px);
  font-weight:800;letter-spacing:-2px;
  background:linear-gradient(135deg,var(--glow-bright),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:8px;
}
.tagline{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.subtitle{font-size:12px;color:var(--muted);margin-top:6px;}

/* ── SERVER CONFIG BANNER ── */
.server-config{
  width:100%;max-width:680px;
  background:rgba(0,217,255,0.06);
  border:1px solid rgba(0,217,255,0.2);
  border-radius:var(--r);
  padding:14px 18px;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.server-config label{
  font-size:9px;letter-spacing:2px;
  color:var(--accent);text-transform:uppercase;
  white-space:nowrap;
}
.server-url-input{
  flex:1;min-width:220px;
  background:rgba(0,0,0,0.3);
  border:1px solid rgba(0,217,255,0.25);
  border-radius:6px;color:var(--text);
  padding:6px 10px;
  font-family:'Space Mono',monospace;font-size:11px;
  direction:ltr;
}
.server-url-input:focus{outline:none;border-color:var(--accent);}
.btn-ping{
  padding:6px 14px;
  background:rgba(0,217,255,0.15);
  border:1px solid rgba(0,217,255,0.3);
  border-radius:6px;color:var(--accent);
  font-family:'Space Mono',monospace;font-size:10px;
  cursor:pointer;white-space:nowrap;
  transition:all 0.2s;
}
.btn-ping:hover{background:rgba(0,217,255,0.25);}
.ping-status{font-size:10px;color:var(--muted);}
.ping-ok{color:var(--success);}
.ping-fail{color:var(--error);}

/* ── MAIN CARD ── */
.main-card{
  width:100%;max-width:680px;
  background:rgba(21,21,34,0.75);
  border:1px solid rgba(139,75,255,0.2);
  border-radius:var(--r);
  padding:32px;
  backdrop-filter:blur(12px);
  box-shadow:0 20px 60px rgba(139,75,255,0.1);
}

/* ── MODEL SELECTOR ── */
.selector-row{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-bottom:18px;padding-bottom:14px;
  border-bottom:1px solid rgba(139,75,255,0.15);
  gap:12px;flex-wrap:wrap;
}
.selector-label{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.model-select{
  background:rgba(30,30,48,0.8);
  border:1px solid rgba(139,75,255,0.3);
  border-radius:8px;color:var(--text);
  padding:8px 14px;
  font-family:'Space Mono',monospace;font-size:11px;
  cursor:pointer;transition:all 0.2s;min-width:200px;
}
.model-select:hover{border-color:var(--glow-bright);box-shadow:0 0 20px rgba(139,75,255,0.2);}
.model-select:focus{outline:none;border-color:var(--accent);}

/* ── PARAMS ROW ── */
.params-row{
  display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;
}
.param-group{
  flex:1;min-width:120px;
  display:flex;flex-direction:column;gap:6px;
}
.param-label{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.param-input{
  background:rgba(30,30,48,0.6);
  border:1px solid rgba(139,75,255,0.2);
  border-radius:6px;color:var(--text);
  padding:7px 10px;
  font-family:'Space Mono',monospace;font-size:11px;
  transition:all 0.2s;width:100%;
}
.param-input:focus{outline:none;border-color:var(--glow-bright);}

/* ── PROMPT ── */
.prompt-section{margin-bottom:22px;}
.section-label{
  font-size:9px;letter-spacing:2.5px;color:var(--muted);
  text-transform:uppercase;margin-bottom:10px;display:block;
}
.prompt-input{
  width:100%;
  background:rgba(30,30,48,0.6);
  border:1px solid rgba(139,75,255,0.2);
  border-radius:var(--r);
  color:var(--text);padding:14px 16px;
  font-family:'Space Mono',monospace;font-size:13px;
  line-height:1.6;resize:vertical;min-height:80px;
  transition:all 0.2s;
}
.prompt-input:focus{
  outline:none;border-color:var(--glow-bright);
  background:rgba(30,30,48,0.9);
  box-shadow:0 0 20px rgba(139,75,255,0.15);
}
.prompt-input::placeholder{color:rgba(139,75,255,0.4);}

/* ── QUICK PROMPTS ── */
.quick-prompts{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;
}
.qp-btn{
  padding:4px 10px;
  background:rgba(139,75,255,0.1);
  border:1px solid rgba(139,75,255,0.2);
  border-radius:20px;
  color:var(--muted);font-size:9px;
  letter-spacing:0.5px;cursor:pointer;
  transition:all 0.2s;
}
.qp-btn:hover{
  background:rgba(139,75,255,0.2);
  color:var(--text);border-color:var(--glow);
}

/* ── INFO BAR ── */
.info-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;
  background:rgba(139,75,255,0.08);
  border:1px solid rgba(139,75,255,0.15);
  border-radius:8px;font-size:10px;
  color:var(--muted);margin-bottom:20px;
}
.info-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;
  background:rgba(139,75,255,0.2);
  border-radius:4px;color:var(--accent);
  font-size:9px;letter-spacing:0.5px;text-transform:uppercase;
}
.info-badge.generating{
  background:rgba(0,217,255,0.15);
  color:var(--accent);
  animation:pulse-badge 1s ease-in-out infinite;
}
.info-badge.success{background:rgba(74,222,128,0.15);color:var(--success);}
.info-badge.error-badge{background:rgba(255,71,87,0.15);color:var(--error);}

@keyframes pulse-badge{
  0%,100%{opacity:0.7}50%{opacity:1}
}

/* ── PROGRESS BAR ── */
.progress-wrap{
  height:3px;background:rgba(139,75,255,0.15);
  border-radius:2px;margin-bottom:20px;
  overflow:hidden;display:none;
}
.progress-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--glow),var(--accent));
  border-radius:2px;
  transition:width 0.3s ease;
}

/* ── BUTTONS ── */
.button-row{display:flex;gap:12px;margin-bottom:0;}
.btn{
  flex:1;padding:13px 20px;border:none;border-radius:8px;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1px;cursor:pointer;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;overflow:hidden;text-transform:uppercase;
}
.btn-primary{
  background:linear-gradient(135deg,var(--glow),var(--glow-bright));
  color:white;
  box-shadow:
    0 6px 20px rgba(139,75,255,0.3),
    inset 0 1px 0 rgba(255,255,255,0.2),
    inset 0 -3px 8px rgba(0,0,0,0.3);
  border-bottom:3px solid rgba(0,0,0,0.4);
}
.btn-primary:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(139,75,255,0.4),inset 0 1px 0 rgba(255,255,255,0.3);
}
.btn-primary:active:not(:disabled){
  transform:translateY(1px);
  box-shadow:0 2px 10px rgba(139,75,255,0.2);
}
.btn-secondary{
  background:rgba(139,75,255,0.15);
  color:var(--accent);
  border:1px solid rgba(139,75,255,0.3);
}
.btn-secondary:hover:not(:disabled){
  background:rgba(139,75,255,0.25);
  border-color:var(--accent);
  box-shadow:0 0 20px rgba(0,217,255,0.2);
}
.btn:disabled{opacity:0.4;cursor:not-allowed;}

/* ── RESULTS ── */
.results{margin-top:40px;max-width:680px;width:100%;}
.results-title{
  font-size:10px;letter-spacing:2.5px;
  color:var(--muted);text-transform:uppercase;
  margin-bottom:16px;text-align:center;
}
.result-card{
  background:rgba(30,30,48,0.7);
  border:1px solid rgba(139,75,255,0.2);
  border-radius:var(--r);padding:20px;
  margin-bottom:16px;
  animation:slideUp 0.4s ease;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.result-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;padding-bottom:10px;
  border-bottom:1px solid rgba(139,75,255,0.15);
}
.result-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);
  animation:dot-pulse 1.5s ease-in-out infinite;
}
.result-dot.done{background:var(--success);animation:none;}
.result-dot.err{background:var(--error);animation:none;}
@keyframes dot-pulse{0%,100%{opacity:0.6}50%{opacity:1;transform:scale(1.2)}}
.result-model{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;flex:1;}
.result-meta{font-size:9px;color:var(--muted);letter-spacing:0.5px;}
.result-prompt{
  font-size:11px;line-height:1.6;color:var(--muted);
  padding:10px 0;font-style:italic;
  direction:ltr;text-align:left;
}
.result-audio{
  width:100%;margin:12px 0;
  border-radius:8px;
  accent-color:var(--glow);
}
.result-actions{display:flex;gap:8px;margin-top:8px;}
.btn-dl{
  padding:7px 16px;
  background:rgba(74,222,128,0.1);
  border:1px solid rgba(74,222,128,0.3);
  border-radius:6px;color:var(--success);
  font-family:'Space Mono',monospace;font-size:10px;
  cursor:pointer;text-decoration:none;
  transition:all 0.2s;display:inline-block;
}
.btn-dl:hover{background:rgba(74,222,128,0.2);}
.btn-retry{
  padding:7px 16px;
  background:rgba(139,75,255,0.1);
  border:1px solid rgba(139,75,255,0.2);
  border-radius:6px;color:var(--muted);
  font-family:'Space Mono',monospace;font-size:10px;
  cursor:pointer;transition:all 0.2s;
}
.btn-retry:hover{color:var(--text);border-color:var(--glow);}
.error-msg{
  font-size:11px;color:var(--error);
  background:rgba(255,71,87,0.08);
  padding:10px 12px;border-radius:6px;
  border:1px solid rgba(255,71,87,0.2);
  margin-top:10px;direction:ltr;text-align:left;
}

/* ── LOADING SPINNER ── */
.spinner{
  width:14px;height:14px;
  border:2px solid rgba(139,75,255,0.3);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:inline-block;vertical-align:middle;margin-left:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
.footer{margin-top:60px;text-align:center;font-size:9px;color:var(--muted);letter-spacing:1px;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .main-card{padding:20px;}
  .logo{font-size:clamp(32px,8vw,48px);}
  .button-row{flex-direction:column;}
  .params-row{flex-direction:column;}
}
</style>
</head>
<body>

<div class="bg-fx">
  <div class="glow-blob blob1"></div>
  <div class="glow-blob blob2"></div>
  <div class="glow-blob blob3"></div>
</div>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">KARIZMO AI</div>
    <p class="tagline">AI SOUND GENERATION</p>
    <p class="subtitle">מוסיקה · אפקטים · סאונד — הכל בפקודה אחת</p>
  </div>

  <!-- SERVER CONFIG -->
  <div class="server-config">
    <label>🌐 כתובת שרת</label>
    <input
      type="text"
      id="serverUrl"
      class="server-url-input"
      placeholder="https://xxxx-xx-xx.ngrok-free.app"
      value="http://localhost:8000"
    />
    <button class="btn-ping" onclick="pingServer()">בדוק חיבור</button>
    <span class="ping-status" id="pingStatus">—</span>
  </div>

  <!-- MAIN CARD -->
  <div class="main-card">

    <!-- MODEL SELECTOR -->
    <div class="selector-row">
      <label class="selector-label">מודל</label>
      <select id="modelSelect" class="model-select">
        <optgroup label="🎵 MusicGen">
          <option value="musicgen-small">MusicGen Small · 300M · מהיר</option>
          <option value="musicgen-medium">MusicGen Medium · 1.5B · מאוזן</option>
          <option value="musicgen-large" selected>MusicGen Large · 3.3B · הכי טוב</option>
          <option value="musicgen-melody">MusicGen Melody · Melody-aware</option>
          <option value="musicgen-stereo-large">MusicGen Stereo Large · סטריאו</option>
          <option value="musicgen-stereo-medium">MusicGen Stereo Medium</option>
        </optgroup>
        <optgroup label="🎙️ AudioGen">
          <option value="audiogen-medium">AudioGen Medium · SFX & אפקטים</option>
        </optgroup>
        <optgroup label="⚡ MAGNeT">
          <option value="magnet-small-10s">MAGNeT Small · 10s · מהיר</option>
          <option value="magnet-medium-10s">MAGNeT Medium · 10s</option>
          <option value="magnet-small-30s">MAGNeT Small · 30s</option>
          <option value="magnet-medium-30s">MAGNeT Medium · 30s</option>
          <option value="audio-magnet-medium">Audio MAGNeT · SFX</option>
        </optgroup>
      </select>
    </div>

    <!-- PARAMS -->
    <div class="params-row">
      <div class="param-group">
        <label class="param-label">⏱ אורך (שניות)</label>
        <input type="number" id="duration" class="param-input" value="8" min="1" max="30" step="1"/>
      </div>
      <div class="param-group">
        <label class="param-label">🌡 טמפרטורה</label>
        <input type="number" id="temperature" class="param-input" value="1.0" min="0.1" max="2" step="0.1"/>
      </div>
      <div class="param-group">
        <label class="param-label">🎚 CFG</label>
        <input type="number" id="cfg" class="param-input" value="3.0" min="1" max="10" step="0.5"/>
      </div>
    </div>

    <!-- PROMPT -->
    <div class="prompt-section">
      <label class="section-label">✍️ תיאור (באנגלית)</label>
      <textarea
        id="promptInput"
        class="prompt-input"
        placeholder="תאר מה שאתה רוצה ליצור...&#10;לדוגמה: upbeat electronic music with synths and heavy drums"
        rows="3"
      ></textarea>
      <div class="quick-prompts">
        <button class="qp-btn" onclick="setPrompt('upbeat electronic music with synths')">electronic</button>
        <button class="qp-btn" onclick="setPrompt('dark ambient cinematic soundscape')">dark ambient</button>
        <button class="qp-btn" onclick="setPrompt('jazz fusion improvisation')">jazz fusion</button>
        <button class="qp-btn" onclick="setPrompt('thunderstorm heavy rain')">thunderstorm</button>
        <button class="qp-btn" onclick="setPrompt('energetic hip hop beat with 808 bass')">hip hop</button>
        <button class="qp-btn" onclick="setPrompt('orchestral strings epic fantasy')">orchestral</button>
      </div>
    </div>

    <!-- STATUS -->
    <div class="info-bar">
      <span>מודל: <strong id="activeModel">MusicGen Large</strong></span>
      <div class="info-badge" id="statusBadge">מוכן</div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- BUTTONS -->
    <div class="button-row">
      <button class="btn btn-primary" id="generateBtn" onclick="generate()">
        ⚡ צור סאונד
      </button>
      <button class="btn btn-secondary" onclick="clearAll()">
        ↻ אפס
      </button>
    </div>

  </div>

  <!-- RESULTS -->
  <div class="results" id="resultsContainer" style="display:none">
    <div class="results-title">תוצאות</div>
    <div id="resultsList"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    KARIZMO AI v2.0 · 2026 · בנוי על AudioCraft · Facebook Research
  </div>

</div>

<script>
// ════════════════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════════════════
const MODEL_NAMES = {
  'musicgen-small':          '🎵 MusicGen Small',
  'musicgen-medium':         '🎵 MusicGen Medium',
  'musicgen-large':          '🎵 MusicGen Large',
  'musicgen-melody':         '🎼 MusicGen Melody',
  'musicgen-stereo-large':   '🎧 MusicGen Stereo L',
  'musicgen-stereo-medium':  '🎧 MusicGen Stereo M',
  'audiogen-medium':         '🎙️ AudioGen',
  'magnet-small-10s':        '⚡ MAGNeT S·10s',
  'magnet-medium-10s':       '⚡ MAGNeT M·10s',
  'magnet-small-30s':        '⚡ MAGNeT S·30s',
  'magnet-medium-30s':       '⚡ MAGNeT M·30s',
  'audio-magnet-medium':     '🔊 Audio MAGNeT',
};

let generating = false;

function getApiUrl() {
  return document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
}

// ════════════════════════════════════════════════════════════════════════
// UI HELPERS
// ════════════════════════════════════════════════════════════════════════
function setStatus(text, type = '') {
  const el = document.getElementById('statusBadge');
  el.textContent = text;
  el.className = 'info-badge' + (type ? ' ' + type : '');
}

function setProgress(pct) {
  const wrap = document.getElementById('progressWrap');
  const bar = document.getElementById('progressBar');
  if (pct === null) {
    wrap.style.display = 'none';
    bar.style.width = '0%';
  } else {
    wrap.style.display = 'block';
    bar.style.width = pct + '%';
  }
}

function setPrompt(text) {
  document.getElementById('promptInput').value = text;
}

document.getElementById('modelSelect').addEventListener('change', (e) => {
  document.getElementById('activeModel').textContent = MODEL_NAMES[e.target.value] || e.target.value;
});

// ════════════════════════════════════════════════════════════════════════
// PING SERVER
// ════════════════════════════════════════════════════════════════════════
async function pingServer() {
  const statusEl = document.getElementById('pingStatus');
  statusEl.textContent = '...';
  statusEl.className = 'ping-status';
  try {
    const res = await fetch(`${getApiUrl()}/`, { signal: AbortSignal.timeout(5000) });
    if (res.ok) {
      const data = await res.json();
      statusEl.textContent = `✓ מחובר · GPU: ${data.gpu || 'CPU'}`;
      statusEl.className = 'ping-status ping-ok';
    } else {
      throw new Error(`HTTP ${res.status}`);
    }
  } catch (e) {
    statusEl.textContent = `✗ לא נגיש (${e.message})`;
    statusEl.className = 'ping-status ping-fail';
  }
}

// ════════════════════════════════════════════════════════════════════════
// GENERATE — מתוקן לחלוטין
// ════════════════════════════════════════════════════════════════════════
async function generate() {
  if (generating) return;

  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt) {
    setStatus('הזן תיאור!', 'error-badge');
    setTimeout(() => setStatus('מוכן'), 2000);
    return;
  }

  const model = document.getElementById('modelSelect').value;
  const duration = parseFloat(document.getElementById('duration').value) || 8;
  const temperature = parseFloat(document.getElementById('temperature').value) || 1.0;
  const cfg_coef = parseFloat(document.getElementById('cfg').value) || 3.0;

  generating = true;
  document.getElementById('generateBtn').disabled = true;
  setStatus('יוצר...', 'generating');
  setProgress(10);

  // Animate progress while waiting
  let prog = 10;
  const progInterval = setInterval(() => {
    prog = Math.min(prog + Math.random() * 8, 85);
    setProgress(prog);
  }, 800);

  // Add a "loading" card immediately
  const cardId = 'card_' + Date.now();
  addLoadingCard(cardId, MODEL_NAMES[model] || model, prompt);
  document.getElementById('resultsContainer').style.display = 'block';

  try {
    const response = await fetch(`${getApiUrl()}/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt,
        model,           // ← תוקן: היה model_id
        duration,
        temperature,
        cfg_coef,
      })
    });

    clearInterval(progInterval);

    if (!response.ok) {
      let errMsg = `שגיאה ${response.status}`;
      try {
        const errData = await response.json();
        errMsg = errData.detail || errMsg;
      } catch {}
      throw new Error(errMsg);
    }

    setProgress(95);

    // השרת מחזיר WAV stream — ← תוקן: היה response.json()
    const blob = await response.blob();
    const audioUrl = URL.createObjectURL(blob);

    setProgress(100);
    setTimeout(() => setProgress(null), 500);

    // שם לקובץ הורדה
    const filename = `karizmo_${model}_${Date.now()}.wav`;

    updateCardSuccess(cardId, audioUrl, filename, response.headers.get('X-Generation-Time'));
    setStatus('הצליח ✓', 'success');
    setTimeout(() => setStatus('מוכן'), 3000);

  } catch (error) {
    clearInterval(progInterval);
    setProgress(null);
    console.error('[Karizmo] Generate error:', error);
    updateCardError(cardId, error.message);
    setStatus('שגיאה', 'error-badge');
    setTimeout(() => setStatus('מוכן'), 4000);
  } finally {
    generating = false;
    document.getElementById('generateBtn').disabled = false;
  }
}

// ════════════════════════════════════════════════════════════════════════
// RESULT CARDS
// ════════════════════════════════════════════════════════════════════════
function addLoadingCard(id, modelName, prompt) {
  const list = document.getElementById('resultsList');
  const card = document.createElement('div');
  card.className = 'result-card';
  card.id = id;
  card.innerHTML = `
    <div class="result-header">
      <div class="result-dot"></div>
      <span class="result-model">${modelName}</span>
      <span class="result-meta">יוצר... <span class="spinner"></span></span>
    </div>
    <div class="result-prompt">"${prompt}"</div>
  `;
  list.insertBefore(card, list.firstChild);
}

function updateCardSuccess(id, audioUrl, filename, genTime) {
  const card = document.getElementById(id);
  if (!card) return;
  const timeLabel = genTime ? `· ${genTime}s` : '';
  card.innerHTML = `
    <div class="result-header">
      <div class="result-dot done"></div>
      <span class="result-model">${card.querySelector('.result-model').textContent}</span>
      <span class="result-meta">הושלם ${timeLabel}</span>
    </div>
    <div class="result-prompt">${card.querySelector('.result-prompt').textContent}</div>
    <audio class="result-audio" controls>
      <source src="${audioUrl}" type="audio/wav">
    </audio>
    <div class="result-actions">
      <a class="btn-dl" href="${audioUrl}" download="${filename}">⬇️ הורד WAV</a>
    </div>
  `;
}

function updateCardError(id, errMsg) {
  const card = document.getElementById(id);
  if (!card) return;
  card.querySelector('.result-dot').className = 'result-dot err';
  card.querySelector('.result-meta').textContent = 'נכשל';
  const prompt = card.querySelector('.result-prompt').textContent;
  card.innerHTML += `
    <div class="error-msg">
      ❌ ${errMsg}<br><br>
      <strong>בדוק:</strong><br>
      1. השרת פועל? לחץ "בדוק חיבור" למעלה<br>
      2. כתובת ngrok נכונה?<br>
      3. AudioCraft מותקן בסביבת הColab?
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════════════
// CLEAR
// ════════════════════════════════════════════════════════════════════════
function clearAll() {
  document.getElementById('promptInput').value = '';
  document.getElementById('resultsList').innerHTML = '';
  document.getElementById('resultsContainer').style.display = 'none';
  setStatus('מוכן');
  setProgress(null);
}
